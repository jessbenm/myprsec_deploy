name: CI / CD — MyPresc

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — CI : vérification TypeScript + build Vite
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: CI — TypeScript & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript — vérification des types
        run: npx tsc --noEmit

      - name: Vite — build de production
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Deploy : uniquement sur push main, après que CI passe
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → VPS
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            echo "══════════════════════════════════════"
            echo " MyPresc Deploy — ${{ github.sha }}"
            echo "══════════════════════════════════════"

            echo ""
            echo "── [1/5] Pull du code ──"
            git pull --ff-only

            echo ""
            echo "── [2/5] Build des images Docker ──"
            docker compose build --no-cache

            echo ""
            echo "── [3/5] Redémarrage des services ──"
            docker compose up -d --remove-orphans

            echo ""
            echo "── [4/5] Attente des healthchecks ──"
            TIMEOUT=120
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              sleep 5
              ELAPSED=$((ELAPSED + 5))
              UNHEALTHY=$(docker compose ps 2>/dev/null | grep -cE "starting|unhealthy" || true)
              if [ "$UNHEALTHY" -eq 0 ]; then
                echo "  Tous les services sont healthy (${ELAPSED}s)"
                break
              fi
              echo "  En attente... (${ELAPSED}s/${TIMEOUT}s)"
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo ""
                echo "ERREUR: Timeout — services pas healthy après ${TIMEOUT}s"
                docker compose ps
                docker compose logs --tail=40
                exit 1
              fi
            done

            echo ""
            echo "── [5/5] État final ──"
            docker compose ps

            echo ""
            echo "── Nettoyage images obsolètes ──"
            docker image prune -f

            echo ""
            echo "✓ Déploiement terminé — commit: ${{ github.sha }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Notification en cas d'échec (issue GitHub auto)
  # ─────────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notifier en cas d'échec
    needs: [ci, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Créer une issue GitHub
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7)
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI/CD échoué — ${sha}`,
              body: [
                `## Échec du pipeline CI/CD`,
                ``,
                `| Champ    | Valeur |`,
                `|----------|--------|`,
                `| Commit   | \`${context.sha}\` |`,
                `| Branche  | \`${context.ref}\` |`,
                `| Run      | [Voir les logs](${runUrl}) |`,
              ].join('\n'),
              labels: ['bug', 'deployment']
            })
