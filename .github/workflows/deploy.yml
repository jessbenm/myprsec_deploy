name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:         # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Build & push images to GHCR ───────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/mypresc-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/mypresc-frontend:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_WS_URL=${{ vars.VITE_WS_URL }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/mypresc-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/mypresc-backend:latest

      - name: Build & push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./infra
          file: ./infra/Dockerfile.nginx
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/mypresc-nginx:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/mypresc-nginx:latest

  # ── Deploy to VPS via SSH ──────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production     # Requires manual approval if configured

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Authenticate with GHCR to pull private images
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update the image tag in .env
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ github.sha }}|" .env
            sed -i "s|^REGISTRY=.*|REGISTRY=ghcr.io/${{ github.repository_owner }}|" .env

            # Pull new images
            docker compose pull

            # Restart with zero-downtime (old containers serve until new ones are healthy)
            docker compose up -d --remove-orphans

            # Clean up old images (keep last 3 per service)
            docker image prune -f

            echo "Deployed ${{ github.sha }} to ${{ secrets.VPS_HOST }}"

  # ── Notify on failure ─────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub issue on deploy failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed: ${context.sha.substring(0, 7)}`,
              body: `Deployment workflow failed for commit ${context.sha}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'deployment']
            });
