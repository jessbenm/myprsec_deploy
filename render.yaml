databases: []

services:
  - type: web
    name: mypresc-backend
    runtime: node
    rootDir: monitoring-backend
    buildCommand: npm install
    startCommand: node index.js
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/metrics-history.db
      - key: FRONTEND_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: COOKIE_SAMESITE
        value: None
      - key: COOKIE_SECURE
        value: "true"
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
    disk:
      name: mypresc-backend-disk
      mountPath: /data
      sizeGB: 1

  - type: static
    name: mypresc-frontend
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false