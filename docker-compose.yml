name: mypresc

services:

  # ── React SPA (built with Vite, served by nginx) ──────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    image: ${REGISTRY:-mypresc}/frontend:${IMAGE_TAG:-latest}
    container_name: mypresc_frontend
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "test", "-f", "/usr/share/nginx/html/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Node.js + Express + SQLite ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ${REGISTRY:-mypresc}/backend:${IMAGE_TAG:-latest}
    container_name: mypresc_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3001}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REDIS_URL: redis://redis:6379
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      # SQLite database persisted in a named volume — never inside the container
      - sqlite_data:/data
    networks:
      - internal
      - external
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - >-
          const p=process.env.PORT||3001;
          require('http').get('http://localhost:'+p+'/api/auth/me',r=>{
            process.exit(r.statusCode<500?0:1);
          }).on('error',()=>process.exit(1));
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx reverse proxy (SSL termination) ────────────────────────────────
  nginx:
    build:
      context: ./infra
      dockerfile: Dockerfile.nginx
    image: ${REGISTRY:-mypresc}/nginx:${IMAGE_TAG:-latest}
    container_name: mypresc_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN}
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      # Set to "nossl" before first SSL certificate, then "ssl" after
      NGINX_CONFIG: ${NGINX_CONFIG:-ssl}
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - internal
      - external
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Certbot — automatic SSL certificate renewal ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: mypresc_certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - external

  redis:
    image: redis:7-alpine
    container_name: mypresc_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # Use the default Redis entrypoint; certbot runs in the separate `certbot` service

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  sqlite_data:
    name: mypresc_sqlite_data
  certbot_certs:
    name: mypresc_certbot_certs
  certbot_www:
    name: mypresc_certbot_www
  redis_data:
    name: mypresc_redis_data

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  # Internal: backend + frontend only reachable from within Docker network
  internal:
    name: mypresc_internal
    internal: true
  # External: nginx + certbot need internet access
  external:
    name: mypresc_external
