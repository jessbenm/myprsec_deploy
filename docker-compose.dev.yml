# Development-only Docker Compose overrides.
# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

name: mypresc

services:
  frontend:
    build:
      target: builder
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      start_period: 15s

  backend:
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    volumes:
      - ./monitoring-backend:/app:ro
      - sqlite_dev_data:/data
    environment:
      NODE_ENV: development
    command: ["node", "--watch", "/app/index.js"]

  nginx:
    profiles:
      - prod

  certbot:
    profiles:
      - prod

volumes:
  sqlite_dev_data:
    name: mypresc_sqlite_dev